<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="/manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="BBMamaAdmin">
  <meta name="theme-color" content="#f5ede6">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">
  <title>Dashboard — BBMamaAdmin</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .img-manage-grid { display: flex; flex-wrap: wrap; justify-content: center; align-items: flex-start; gap: 10px; margin: 12px auto; width: 100%; touch-action: pan-y; }
    .img-manage-card { position: relative; width: 110px; border-radius: 8px; overflow: hidden; border: 1px solid #eee; background: #fafafa; cursor: grab; transition: transform .15s, box-shadow .15s, opacity .2s; touch-action: pan-y; }
    .img-manage-card:active { cursor: grabbing; }
    .img-manage-card img { width: 110px; height: 110px; object-fit: cover; display: block; pointer-events: none; }
    .img-manage-card .img-order-badge {
      position: absolute; top: 4px; left: 4px; background: rgba(0,0,0,.5); color: #fff;
      font-size: .55rem; font-weight: 700; padding: 2px 6px; border-radius: 6px; z-index: 2;
    }
    .img-manage-card .btn-del-img { position: absolute; top: 4px; right: 4px; background: rgba(220,60,60,.85); color: #fff; border: none; width: 24px; height: 24px; border-radius: 50%; font-size: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center; line-height: 1; z-index: 2; }
    .img-manage-card .btn-del-img:hover { background: #c0392b; }
    .img-cat-select {
      width: 100%; border: none; border-top: 1px solid #f0ece6;
      padding: 5px 6px; font-size: .58rem; color: #555;
    }
    .img-manage-card.dragging { opacity: .35; transform: scale(.92); }
    .img-manage-card.drag-over {
      border: 2px solid #cb9e8a; box-shadow: 0 0 0 3px rgba(203,158,138,.3);
      transform: scale(1.05);
    }
    .img-manage-card.clone-flying {
      position: fixed; z-index: 9999; pointer-events: none;
      transition: none; opacity: .8; transform: scale(1.1) rotate(2deg);
      width: 100px; height: 100px; border-radius: 8px; overflow: hidden;
      box-shadow: 0 8px 30px rgba(0,0,0,.25);
    }
    .save-order-btn-wrap { text-align: center; margin-top: 15px; }
    .save-order-btn-wrap button { opacity: .4; pointer-events: none; transition: opacity .2s; padding: 10px 28px; font-size: .85rem; border-radius: 24px; }
    .save-order-btn-wrap button.active { opacity: 1; pointer-events: auto; }
    @media(max-width:480px){
      .img-manage-card { width: 80px; }
      .img-manage-card img { width: 80px; height: 80px; }
    }
  </style>
</head>
<body>
  <div id="overlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:998;"></div>
  <div id="modal-container" style="position:fixed;inset:0;display:none;align-items:center;justify-content:center;z-index:999;">
    <div style="background:#fff;border-radius:20px;padding:18px 12px;max-width:420px;width:92%;max-height:90vh;overflow-y:auto;box-shadow:0 12px 48px rgba(0,0,0,.25);">
      <div style="display:flex;justify-content:space-between;align-items:center;padding:0 4px 12px;border-bottom:1px solid #f0ece6;">
        <span style="font-weight:700;font-size:.9rem;color:#555;">Manage Images</span>
        <button onclick="closeModal()" style="background:none;border:none;font-size:1.15rem;cursor:pointer;color:#999;">✕</button>
      </div>
      <div id="modal-body"></div>
    </div>
  </div>
  <header class="admin-header">
    <div class="admin-header-inner">
      <div class="admin-brand">📦 BBMamaAdmin</div>
      <nav class="admin-nav" id="adminNav">
        <a href="/admin/dashboard" class="active">📊 Dashboard</a>
        <a href="/admin/orders">📋 Orders</a>
        <a href="/admin/settings">⚙️ Settings</a>
        <a href="#" onclick="doLogout()">🚪 Logout</a>
      </nav>
      <button class="hamburger" onclick="document.getElementById('adminNav').classList.toggle('open')">☰</button>
    </div>
  </header>
  <main class="admin-main">
    <div class="admin-metrics" id="metrics">
      <div class="metric-card" onclick="applyFilter('all')"><div class="metric-val" id="mTotal">—</div><div class="metric-lbl">Total Packages</div></div>
      <div class="metric-card" onclick="applyFilter('active')"><div class="metric-val" id="mActive">—</div><div class="metric-lbl">Active</div></div>
      <div class="metric-card" onclick="applyFilter('sold_out')"><div class="metric-val" id="mSold">—</div><div class="metric-lbl">Sold Out</div></div>
      <div class="metric-card" onclick="applyFilter('draft')"><div class="metric-val" id="mDraft">—</div><div class="metric-lbl">Draft</div></div>
      <div class="metric-card" onclick="applyFilter('preorder')"><div class="metric-val" id="mPreorder">—</div><div class="metric-lbl">Preorder</div></div>
    </div>
    <div class="admin-toolbar">
      <input type="text" id="searchBox" placeholder="🔍 Search packages..." oninput="renderTable()" style="flex:1;padding:8px 12px;border:1px solid #e6ddd6;border-radius:10px;font-size:.8rem;">
      <select id="filterSelect" onchange="renderTable()" style="padding:8px 12px;border:1px solid #e6ddd6;border-radius:10px;font-size:.8rem;">
        <option value="all">All Status</option>
        <option value="active">Active</option>
        <option value="draft">Draft</option>
        <option value="sold_out">Sold Out</option>
        <option value="hidden">Hidden</option>
        <option value="preorder">Preorder</option>
      </select>
      <a href="/admin/product-new" class="btn-primary" style="padding:8px 16px;border-radius:24px;text-decoration:none;font-size:.78rem;white-space:nowrap;">+ New Package</a>
    </div>
    <div class="table-wrap" id="tableWrap">
      <table class="admin-table"><thead><tr><th>Image</th><th>Name</th><th>Category</th><th>Price</th><th>Status</th><th style="width:110px;">Actions</th></tr></thead><tbody id="tbody"></tbody></table>
    </div>
  </main>

  <script>
    const BASE = window.location.origin;
    let packages=[], categories=[];
    let filterMode='all';

    function applyFilter(f){filterMode=f;document.getElementById('filterSelect').value='all';renderTable();}

    function getStatusBadge(s){
      const m={'active':'🟢 Active','draft':'⚪ Draft','sold_out':'🔴 Sold Out','hidden':'⚫ Hidden','preorder':'🟡 Preorder'};
      return m[s]||s;
    }
    function getCatName(id){const c=categories.find(x=>x.id==id);return c?c.name:'?'}

    async function loadData(){
      try{
        const[pk,cat]=await Promise.all([
          fetch('/api/packages').then(r=>r.ok?r.json():{packages:[]}),
          fetch('/api/categories').then(r=>r.ok?r.json():{categories:[]})
        ]);
        packages=pk.packages||[]; categories=cat.categories||[];
        updateMetrics(); renderTable();
      }catch(e){document.getElementById('tableWrap').innerHTML='<p style="text-align:center;padding:40px;color:#b88;">❌ Failed to load data</p>'}
    }

    function updateMetrics(){
      const all=packages;
      document.getElementById('mTotal').textContent=all.length;
      document.getElementById('mActive').textContent=all.filter(p=>p.status==='active').length;
      document.getElementById('mSold').textContent=all.filter(p=>p.status==='sold_out').length;
      document.getElementById('mDraft').textContent=all.filter(p=>p.status==='draft').length;
      document.getElementById('mPreorder').textContent=all.filter(p=>p.status==='preorder').length;
    }

    function renderTable(){
      const q=(document.getElementById('searchBox').value||'').toLowerCase();
      const fs=document.getElementById('filterSelect').value;
      let list=packages;
      if(filterMode!=='all'){list=list.filter(p=>p.status===filterMode);filterMode='all';}
      else if(fs!=='all')list=list.filter(p=>p.status===fs);
      if(q)list=list.filter(p=>p.name.toLowerCase().includes(q)||(p.short_description||'').toLowerCase().includes(q));
      const t=document.getElementById('tbody');
      if(!list.length){t.innerHTML='<tr><td colspan="6" style="text-align:center;padding:40px;color:#aaa;">No packages found</td></tr>';return;}
      t.innerHTML=list.map(p=>`<tr>
        <td><img src="${p.main_image_url||p.preview_image||'/images/placeholder.png'}" style="width:48px;height:48px;object-fit:cover;border-radius:6px;" loading="lazy" onerror="this.src='/images/placeholder.png'"></td>
        <td><strong>${p.name}</strong>${p.badge?` <span style="background:#cb9e8a;color:#fff;font-size:.6rem;padding:1px 6px;border-radius:4px;">${p.badge}</span>`:''}<br><span style="font-size:.65rem;color:#999;">${p.slug}</span></td>
        <td>${getCatName(p.category_id)}</td>
        <td>${p.promo_price?`<span style="color:#b8735a;font-weight:700;">RM${p.promo_price}</span> <span style="text-decoration:line-through;color:#bbb;font-size:.7rem;">RM${p.price}</span>`:`RM${p.price}`}</td>
        <td>${getStatusBadge(p.status)}</td>
        <td style="white-space:nowrap;">
          <button class="btn-sm" onclick="manageImages(${p.id},'${p.name.replace(/'/g,"\\'")}')" title="Manage Images">🖼️</button>
          <a href="/admin/product-edit?id=${p.id}" class="btn-sm" title="Edit">✏️</a>
          <button class="btn-sm" onclick="deletePackage(${p.id})" title="Delete" style="color:#c0392b;">🗑️</button>
        </td>
      </tr>`).join('');
    }

    async function deletePackage(id){
      if(!confirm('Delete this package?'))return;
      try{
        const r=await fetch(`/api/packages/${id}`,{method:'DELETE'});
        if(!r.ok)throw Error((await r.json()).error||'Delete failed');
        packages=packages.filter(p=>p.id!==id);updateMetrics();renderTable();
      }catch(e){alert('Error: '+e.message)}
    }

    /* ─── Manage Images Modal (drag reorder) ─── */
    let modalImages=[], modalPkgId=null, imgOrderDirty=false;

    function openModal(pkgId){document.getElementById('overlay').style.display='block';document.getElementById('modal-container').style.display='flex';modalPkgId=pkgId;}
    function closeModal(){document.getElementById('overlay').style.display='none';document.getElementById('modal-container').style.display='none';imgOrderDirty=false;}

    async function manageImages(id, name) {
      openModal(id);
      document.getElementById('modal-body').innerHTML=`<p style="text-align:center;padding:20px;color:#999;">Loading images...</p>`;
      try {
        const r=await fetch(`/api/packages/${id}`);
        const d=await r.json();
        modalImages=(d.images||[]).sort((a,b)=>(a.sort_order||0)-(b.sort_order||0));
        renderModalImages(modalImages);
        renderImageUploader(id);
      } catch(e) {
        document.getElementById('modal-body').innerHTML=`<p style="color:#b88;text-align:center;">❌ Failed to load images</p>`;
      }
    }

    function renderModalImages(imgs) {
      const body=document.getElementById('modal-body');
      if(!imgs.length){
        body.innerHTML=`<p style="text-align:center;padding:30px;color:#bbb;">No images yet. Upload below.</p>`+body.innerHTML.slice(0,0);
        return;
      }
      const g=document.createElement('div');g.className='img-manage-grid';g.id='imgGrid';
      g.innerHTML=imgs.map((img,i)=>`<div class="img-manage-card" draggable="true" data-id="${img.id}" data-index="${i}">
        <span class="img-order-badge">#${i+1}</span>
        <button class="btn-del-img" onclick="deleteImage(${img.id})" title="Delete">✕</button>
        <img src="${img.image_url}" alt="" loading="lazy" onerror="this.parentElement.style.opacity='.3'">
      </div>`).join('');
      /* remove old grid, keep uploader */
      const old=document.getElementById('imgGrid');if(old)old.remove();
      const uploader=body.querySelector('.upload-section');
      body.innerHTML='';body.appendChild(g);
      if(uploader)body.appendChild(uploader);
      initDragDrop();
    }

    function renderImageUploader(pkgId){
      if(document.querySelector('.upload-section'))return;
      const sec=document.createElement('div');sec.className='upload-section';
      sec.style.cssText='margin-top:16px;padding-top:16px;border-top:1px solid #f0ece6;text-align:center;';
      sec.innerHTML=`
        <label style="display:inline-block;padding:8px 20px;background:#cb9e8a;color:#fff;border-radius:20px;font-size:.78rem;cursor:pointer;">📤 Upload Image
          <input type="file" accept="image/*" style="display:none;" onchange="uploadImage(${pkgId},this)">
        </label>
        <div id="uploadProgress" style="margin-top:10px;font-size:.7rem;color:#999;display:none;"></div>
      `;
      document.getElementById('modal-body').appendChild(sec);
    }

    async function uploadImage(pkgId,input){
      const f=input.files[0];if(!f)return;
      if(f.size>5*1024*1024){alert('Max 5MB');input.value='';return;}
      const p=document.getElementById('uploadProgress');p.style.display='block';p.textContent='Uploading...';
      const fd=new FormData();fd.append('image',f);fd.append('package_id',pkgId);
      try{
        const r=await fetch('/api/upload',{method:'POST',body:fd});
        if(!r.ok)throw Error((await r.json()).error||'Upload failed');
        input.value='';p.textContent='✅ Done! Refreshing...';
        await manageImages(modalPkgId,'');
      }catch(e){p.textContent='❌ '+e.message;}
    }

    async function deleteImage(imgId){
      if(!confirm('Delete this image?'))return;
      try{
        const r=await fetch(`/api/images/${imgId}`,{method:'DELETE'});
        if(!r.ok)throw Error((await r.json()).error||'Delete failed');
        await manageImages(modalPkgId,'');
      }catch(e){alert('Error: '+e.message);}
    }

    /* ─── Drag & Drop Reorder ─── */
    let dragSrcId=null, dragSrcIdx=null, cloneEl=null;

    function initDragDrop(){
      const cards=document.querySelectorAll('.img-manage-card');
      cards.forEach(c=>{
        c.removeEventListener('dragstart',onDragStart);c.removeEventListener('dragend',onDragEnd);
        c.removeEventListener('dragover',onDragOver);c.removeEventListener('dragenter',onDragEnter);
        c.removeEventListener('dragleave',onDragLeave);c.removeEventListener('drop',onDrop);
        c.removeEventListener('touchstart',onTouchStart);c.removeEventListener('touchmove',onTouchMove);
        c.removeEventListener('touchend',onTouchEnd);
        c.addEventListener('dragstart',onDragStart);c.addEventListener('dragend',onDragEnd);
        c.addEventListener('dragover',onDragOver);c.addEventListener('dragenter',onDragEnter);
        c.addEventListener('dragleave',onDragLeave);c.addEventListener('drop',onDrop);
        c.addEventListener('touchstart',onTouchStart,{passive:false});c.addEventListener('touchmove',onTouchMove,{passive:false});
        c.addEventListener('touchend',onTouchEnd);
      });
    }

    function onDragStart(e){
      dragSrcId=this.dataset.id;dragSrcIdx=parseInt(this.dataset.index);
      this.classList.add('dragging');e.dataTransfer.effectAllowed='move';e.dataTransfer.setData('text/plain',this.dataset.id);
    }
    function onDragEnd(e){
      this.classList.remove('dragging');
      document.querySelectorAll('.img-manage-card.drag-over').forEach(c=>c.classList.remove('drag-over'));
    }
    function onDragOver(e){e.preventDefault();e.dataTransfer.dropEffect='move';}
    function onDragEnter(e){e.preventDefault();this.classList.add('drag-over');}
    function onDragLeave(e){this.classList.remove('drag-over');}
    function onDrop(e){
      e.preventDefault();this.classList.remove('drag-over');
      const targetIdx=parseInt(this.dataset.index);
      if(dragSrcIdx===targetIdx)return;
      moveImage(dragSrcIdx,targetIdx);
    }

    /* Touch drag */
    let touchStartY=0, touchStartX=0, touchedCard=null, touching=false;

    function onTouchStart(e){
      const c=e.currentTarget;touchedCard=c;touching=false;
      const t=e.touches[0];touchStartY=t.clientY;touchStartX=t.clientX;
      dragSrcId=c.dataset.id;dragSrcIdx=parseInt(c.dataset.index);
      /* wait a bit to distinguish tap vs drag */
      this._touchTimer=setTimeout(()=>{
        touching=true;
        /* create flying clone */
        cloneEl=c.cloneNode(true);cloneEl.className='img-manage-card clone-flying';
        cloneEl.style.left=(t.clientX-50)+'px';cloneEl.style.top=(t.clientY-50)+'px';
        document.body.appendChild(cloneEl);
        c.classList.add('dragging');
      },150);
    }

    function onTouchMove(e){
      if(!touching||!cloneEl){clearTimeout(this._touchTimer);return;}
      e.preventDefault();
      const t=e.touches[0];
      cloneEl.style.left=(t.clientX-50)+'px';cloneEl.style.top=(t.clientY-50)+'px';
      /* hit test */
      const cards=document.querySelectorAll('.img-manage-card');
      cards.forEach(c=>c.classList.remove('drag-over'));
      const el=document.elementFromPoint(t.clientX,t.clientY);
      if(el){
        const card=el.closest('.img-manage-card');
        if(card&&card!==touchedCard)card.classList.add('drag-over');
      }
    }

    function onTouchEnd(e){
      clearTimeout(this._touchTimer);
      if(cloneEl){cloneEl.remove();cloneEl=null;}
      touchedCard&&touchedCard.classList.remove('dragging');
      const target=document.querySelector('.img-manage-card.drag-over');
      if(target&&touching){
        const targetIdx=parseInt(target.dataset.index);
        if(dragSrcIdx!==targetIdx)moveImage(dragSrcIdx,targetIdx);
      }
      document.querySelectorAll('.img-manage-card.drag-over').forEach(c=>c.classList.remove('drag-over'));
      touching=false;
    }

    function moveImage(fromIdx,toIdx){
      const item=modalImages.splice(fromIdx,1)[0];
      modalImages.splice(toIdx,0,item);
      imgOrderDirty=true;
      renderModalImages(modalImages);
      showSaveButton();
    }

    function showSaveButton(){
      let btn=document.querySelector('.save-order-btn');
      if(!btn){
        const wrap=document.createElement('div');wrap.className='save-order-btn-wrap';
        wrap.innerHTML=`<button class="btn-primary save-order-btn" onclick="saveImageOrder()">💾 Simpan Susunan</button>`;
        document.getElementById('modal-body').appendChild(wrap);
        btn=wrap.querySelector('button');
      }
      btn.classList.add('active');btn.textContent='💾 Simpan Susunan';
    }

    async function saveImageOrder(){
      const order=modalImages.map(img=>img.id);
      const btn=document.querySelector('.save-order-btn');if(!btn)return;
      btn.textContent='⏳ Menyimpan...';
      try{
        const r=await fetch('/api/images/reorder',{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({order})});
        if(!r.ok)throw Error((await r.json()).error||'Save failed');
        btn.textContent='✅ Tersimpan!';imgOrderDirty=false;
        setTimeout(()=>{btn.classList.remove('active');btn.textContent='💾 Simpan Susunan';},1200);
      }catch(e){btn.textContent='❌ '+e.message;}
    }

    /* ─── Logout ─── */
    async function doLogout(){
      try{await fetch('/api/logout',{method:'POST'});}catch(e){}
      location.href='/admin/login';
    }

    loadData();

    /* ─── Register Service Worker ─── */
    if('serviceWorker' in navigator){
      navigator.serviceWorker.register('/sw.js').catch(()=>{});
    }
  </script>
</body>
</html>
